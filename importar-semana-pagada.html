<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Registrar semana pagada — Titan Car Wash</title>
<style>
  body{font-family:system-ui,sans-serif;background:#0a0a0f;color:#e8f4f8;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;}
  .box{background:#1a2333;border:1px solid #2e3f55;border-radius:16px;padding:2rem;max-width:520px;width:100%;margin:1rem;}
  h2{color:#00c4d4;margin-bottom:.5rem;}
  p{color:#7a9ab0;font-size:13px;margin-bottom:1.5rem;line-height:1.6;}
  .btn{background:#00c4d4;color:#000;border:none;padding:12px 24px;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;width:100%;margin-bottom:10px;}
  .btn:disabled{opacity:.4;cursor:default;}
  .log{background:#111;border-radius:8px;padding:1rem;font-size:12px;font-family:monospace;max-height:250px;overflow-y:auto;margin-top:1rem;color:#7a9ab0;}
  .ok{color:#2ecc8a;}.err{color:#e05555;}
  table{width:100%;border-collapse:collapse;margin-bottom:1rem;font-size:13px;}
  th{text-align:left;color:#7a9ab0;padding:6px 8px;border-bottom:1px solid #2e3f55;}
  td{padding:6px 8px;}
</style>
</head>
<body>
<div class="box">
  <h2>Registrar semana pagada</h2>
  <p>Este script registra en Firebase que la semana <strong>20/04 → 26/04</strong> ya fue pagada, para que el dashboard no la muestre como deuda pendiente.</p>
  
  <table>
    <tr><th>Empleado</th><th>Días</th><th>Cobró</th></tr>
    <tr><td>Agustin</td><td>7</td><td>$210.000</td></tr>
    <tr><td>Leandro</td><td>6</td><td>$120.000</td></tr>
    <tr><td>Gustavo</td><td>0</td><td>$0</td></tr>
    <tr><td>Lucas</td><td>5</td><td>$100.000</td></tr>
    <tr><td><strong>Total</strong></td><td></td><td><strong>$430.000</strong></td></tr>
  </table>

  <button class="btn" id="btn" onclick="registrar()">Registrar semana pagada</button>
  <div class="log" id="log">Listo...</div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyC7CURzUFKRJOZ2A8djNwNmAd8IsjbIJks",
  authDomain: "titan-carwash.firebaseapp.com",
  projectId: "titan-carwash",
  storageBucket: "titan-carwash.firebasestorage.app",
  messagingSenderId: "728040110707",
  appId: "1:728040110707:web:08fb4150bbbff01fcb4806"
};
firebase.initializeApp(firebaseConfig);
const db  = firebase.firestore();
const auth = firebase.auth();
const googleProvider = new firebase.auth.GoogleAuthProvider();

function log(msg, cls='') {
  const el = document.getElementById('log');
  el.innerHTML += `<div class="${cls}">${msg}</div>`;
  el.scrollTop = el.scrollHeight;
}

async function registrar() {
  const btn = document.getElementById('btn');
  btn.disabled = true;

  // Login con Google primero
  log('Iniciando sesión con Google...');
  try {
    await auth.signInWithPopup(googleProvider);
    log('✓ Autenticado', 'ok');
  } catch(e) {
    log('✗ Error de autenticación: ' + e.message, 'err');
    btn.disabled = false;
    return;
  }

  // Buscar IDs de empleados
  log('Buscando empleados en Firebase...');
  const empSnap = await db.collection('empleados').get();
  const emps = {};
  empSnap.docs.forEach(d => {
    emps[d.data().nombre.toLowerCase()] = d.id;
  });
  log('Empleados encontrados: ' + Object.keys(emps).join(', '), 'ok');

  const empleados = [
    {nombre:'Agustin', diasTrab:7, bruto:210000, adelantado:0, neto:210000},
    {nombre:'Leandro', diasTrab:6, bruto:120000, adelantado:0, neto:120000},
    {nombre:'Gustavo', diasTrab:0, bruto:0,      adelantado:0, neto:0},
    {nombre:'Lucas',   diasTrab:5, bruto:100000, adelantado:0, neto:100000},
  ].map(e => ({
    ...e,
    empId: emps[e.nombre.toLowerCase()] || '?'
  }));

  // Verificar que encontró todos
  const faltantes = empleados.filter(e => e.empId === '?').map(e => e.nombre);
  if(faltantes.length > 0) {
    log('⚠️ No encontré estos empleados: ' + faltantes.join(', ') + '. Verificá los nombres en Firebase.', 'err');
  }

  // Guardar semana pagada
  try {
    await db.collection('semanasPagadas').add({
      f1: '2026-04-20',
      f2: '2026-04-26',
      total: 430000,
      fecha: '2026-04-26',
      user: 'Sebastian',
      empleados
    });
    log('✅ Semana registrada como pagada correctamente', 'ok');
    btn.textContent = '✅ Listo — podés cerrar esta página';
  } catch(e) {
    log('✗ Error guardando: ' + e.message, 'err');
    btn.disabled = false;
  }
}
</script>
</body>
</html>
